<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Feedback | Handyman Painting L.L.C.</title>
        <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .brand-red { color: #E31E24; }
        .bg-brand-red { background-color: #E31E24; }
        .bg-brand-black { background-color: #1A1A1A; }
    </style>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>`n<link rel="icon" type="image/jpeg" href="logo.jpg">`n</head>
<body class="bg-zinc-50 text-slate-900">

    <nav class="py-4 bg-white shadow-md border-b-4 border-brand-red">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html"><img src="logo.jpg" alt="Handyman Painting L.L.C." class="h-16 w-auto"></a>
            <a href="index.html" class="text-sm font-bold uppercase tracking-widest hover:brand-red transition">← Return Home</a>
        </div>
    </nav>

    <section class="py-16">
        <div class="container mx-auto px-6 max-w-2xl">
            <div class="text-center mb-10">
                <h1 class="text-5xl font-black uppercase italic brand-red leading-none">Project<br>Feedback</h1>
                <p class="text-slate-500 mt-4 font-bold uppercase tracking-widest">Help us maintain the highest regional standards.</p>
            </div>

            <form action="https://formspree.io/f/xnjgzgbq" method="POST" class="bg-white p-10 shadow-2xl border border-zinc-200">
                <input type="hidden" name="_next" value="https://construction.seemoneyproductions.com/transparency.html">
                <input type="hidden" name="_subject" value="New Project Feedback Received">

                <div class="space-y-8">
                    <div>
                        <label class="block text-xs font-black uppercase text-zinc-400 mb-2">Client or Project Name</label>
                        <input type="text" name="name" autocomplete=" autocomplete="name"name" class="w-full p-4 bg-zinc-50 border-b-2 border-zinc-200 focus:border-brand-red outline-none transition" required>
                    </div>

                    <div>
                        <label class="block text-xs font-black uppercase text-zinc-400 mb-2">Service Provided</label>
                        <select name="service_type" class="w-full p-4 bg-zinc-50 border-b-2 border-zinc-200 outline-none font-bold text-sm uppercase">
                            <option value="Interior Painting">Interior Painting</option>
                            <option value="Exterior Painting">Exterior Painting</option>
                            <option value="Cabinet Refinishing">Cabinet Refinishing / Fine Finish</option>
                            <option value="Commercial Painting">Commercial Painting</option>
                            <option value="Handyman Services">Handyman / General Repair</option>
                            <option value="Farm/Ranch Specialist">Farm/Ranch Specialist</option>
                            <option value="Pressure Washing">Pressure Washing & Prep</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-black uppercase text-zinc-400 mb-2">Performance Rating</label>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <label class="flex items-center space-x-3 bg-zinc-50 p-4 border border-zinc-100 hover:border-red-500 cursor-pointer transition">
                                <input type="radio" name="rating" value="Exceeded Expectations" class="accent-red-600" required>
                                <span class="font-bold text-[10px] uppercase">Exceeded Expectations</span>
                            </label>
                            <label class="flex items-center space-x-3 bg-zinc-50 p-4 border border-zinc-100 hover:border-red-500 cursor-pointer transition">
                                <input type="radio" name="rating" value="Met Expectations" class="accent-red-600">
                                <span class="font-bold text-[10px] uppercase">Met Expectations</span>
                            </label>
                            <label class="flex items-center space-x-3 bg-zinc-50 p-4 border border-zinc-100 hover:border-red-500 cursor-pointer transition">
                                <input type="radio" name="rating" value="Minor Issues" class="accent-red-600">
                                <span class="font-bold text-[10px] uppercase">Satisfactory (Minor Issues)</span>
                            </label>
                            <label class="flex items-center space-x-3 bg-zinc-50 p-4 border border-zinc-100 hover:border-red-500 cursor-pointer transition">
                                <input type="radio" name="rating" value="Needs Improvement" class="accent-red-600">
                                <span class="font-bold text-[10px] uppercase">Needs Improvement</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-black uppercase text-zinc-400 mb-2">Your Comments</label>
                        <textarea autocomplete="off" name="comments" rows="5" class="w-full p-4 bg-zinc-50 border-b-2 border-zinc-200 focus:border-brand-red outline-none transition" placeholder="Share your experience with our quality and timeline..."></textarea>
                    </div>

                    <div class="bg-zinc-100 p-4 border-l-4 border-brand-red">
                        <label class="flex items-start cursor-pointer">
                            <input type="checkbox" name="transparency_consent" class="mt-1 accent-red-600" value="Yes">
                            <span class="ml-3 text-[11px] font-bold uppercase text-slate-600 leading-tight">
                                I consent to this feedback being displayed on the Accountability & Transparency page.
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="w-full bg-brand-black text-white p-6 font-black text-2xl hover:bg-brand-red transition uppercase shadow-xl italic">
                        Submit To Record
                    </button>
                </div>
            </form>
        </div>
    </section>

    <footer class="py-12 bg-white text-center border-t border-zinc-100">
        <p class="text-xs text-slate-600 uppercase tracking-[0.4em]">© 2026 Jesse Bautista III | Handyman Painting L.L.C.</p>
    </footer>

</body>
</html>
